name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are not configured. Add VERCEL_ORG_ID, VERCEL_PROJECT_ID, and VERCEL_TOKEN to enable production deploys."
          fi

      - name: Checkout
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm ci

      - name: Lint
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm run lint

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel production environment
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production

      - name: Build production output
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: vercel build --prod

      - name: Deploy production output
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod
